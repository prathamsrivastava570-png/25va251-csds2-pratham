<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Java Script Variable</h1>
    <script>
        //var definition?
        //vars are container in js

        var myName="Panda";
        document.write(myName);
        console.log(myName);
        //js execution and scope(globaland local)
        function demo(){
            var msg="thanks";  //local
            console.log(msg);
        }
        demo();
        //variabledeclaation using let and constant
        let msg2="thanks again";
        console.log(msg2);
        const msg3="thank you for your visit";
        console.log(msg3);
        </script>
</body>
</html>
